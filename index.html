<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Морской бой + Квиз</title>
  <style>
    :root {
      --bg-deep: #0a1628;
      --bg-panel: #122a4a;
      --accent: #3d9be9;
      --accent-glow: #5eb8ff;
      --gold: #f0c14b;
      --hit: #e74c3c;
      --miss: #7f8c9a;
      --wound: #f39c12;
      --kill: #c0392b;
      --success: #2ecc71;
      --text: #e8f4fc;
      --text-dim: #8eb4d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, var(--bg-deep) 0%, #0d2137 50%, #061018 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(61,155,233,.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(240,193,75,.05) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    .screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 1.5rem; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      text-align: center;
      margin-bottom: .25rem;
      background: linear-gradient(90deg, var(--accent-glow), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--text-dim); text-align: center; margin-bottom: 1.5rem; font-size: .95rem; }
    .panel {
      background: rgba(18, 42, 74, .85);
      border: 1px solid rgba(94, 184, 255, .25);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .panel h2 { font-size: 1rem; color: var(--accent-glow); margin-bottom: .75rem; font-weight: 600; }
    .options { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .options label {
      flex: 1 1 calc(50% - .25rem);
      min-width: 140px;
      cursor: pointer;
      padding: .65rem .9rem;
      border-radius: 10px;
      border: 2px solid rgba(94,184,255,.2);
      background: rgba(10,22,40,.6);
      transition: all .2s;
      font-size: .9rem;
    }
    .options label:hover { border-color: var(--accent); background: rgba(61,155,233,.15); }
    .options input { display: none; }
    .options input:checked + span { color: var(--gold); font-weight: 600; }
    .options label:has(input:checked) {
      border-color: var(--gold);
      background: rgba(240,193,75,.12);
      box-shadow: 0 0 12px rgba(240,193,75,.2);
    }
    .btn {
      display: block;
      width: 100%;
      padding: .85rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #2a7bc8);
      color: #fff;
      box-shadow: 0 4px 20px rgba(61,155,233,.4);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(61,155,233,.5); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .game-header {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .stat {
      background: var(--bg-panel);
      border: 1px solid rgba(94,184,255,.2);
      border-radius: 10px;
      padding: .5rem 1rem;
      font-size: .85rem;
    }
    .stat strong { color: var(--gold); margin-right: .35rem; }
    .stat.correct strong { color: var(--success); }
    .stat.wrong strong { color: var(--hit); }
    .game-meta { font-size: .85rem; color: var(--text-dim); }
    .board-wrap { display: flex; flex-direction: column; align-items: center; gap: .5rem; }
    .board-labels { display: grid; grid-template-columns: 28px repeat(10, 36px); gap: 2px; font-size: .75rem; color: var(--text-dim); }
    .board-labels .corner { width: 28px; }
    .board-row-labels { display: flex; flex-direction: column; gap: 2px; margin-right: 4px; }
    .board-row-labels span {
      height: 36px; width: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: var(--text-dim);
    }
    .board-container { display: flex; align-items: flex-start; }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 36px);
      grid-template-rows: repeat(10, 36px);
      gap: 2px;
      padding: 8px;
      background: rgba(18, 42, 74, .9);
      border-radius: 12px;
      border: 2px solid rgba(94, 184, 255, .3);
      box-shadow: inset 0 0 40px rgba(0,0,0,.3);
    }
    .cell {
      width: 36px; height: 36px;
      border-radius: 6px;
      background: linear-gradient(180deg, #1a4a6e 0%, #0f3050 100%);
      border: 1px solid rgba(94,184,255,.15);
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; text-align: center; line-height: 1.1;
      color: #fff;
    }
    .cell:hover:not(.shot) {
      background: linear-gradient(180deg, #256a9a 0%, #1a5080 100%);
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(94,184,255,.4);
    }
    .cell.shot { cursor: default; pointer-events: none; }
    .cell.miss { background: #2c3e50; color: var(--miss); }
    .cell.wound { background: linear-gradient(180deg, #d35400, #a04000); animation: pulse .4s; }
    .cell.kill { background: linear-gradient(180deg, var(--kill), #7b241c); }
    .cell.empty {
      background: linear-gradient(180deg, #2a4558 0%, #1e3648 100%);
      border-color: rgba(127, 154, 171, .35);
      color: #9eb4c4;
      font-size: 1.35rem;
      line-height: 1;
      letter-spacing: 0;
    }
    @keyframes pulse { 50% { transform: scale(1.1); } }
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(6, 16, 24, .85);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-panel);
      border: 1px solid rgba(94,184,255,.35);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 480px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(-10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 { font-size: 1rem; color: var(--accent-glow); margin-bottom: 1rem; line-height: 1.4; }
    .modal .answers { display: flex; flex-direction: column; gap: .5rem; }
    .modal .answer-btn {
      padding: .75rem 1rem;
      text-align: left;
      border-radius: 10px;
      border: 2px solid rgba(94,184,255,.2);
      background: rgba(10,22,40,.8);
      color: var(--text);
      cursor: pointer;
      font-size: .9rem;
      transition: all .15s;
    }
    .modal .answer-btn:hover { border-color: var(--accent); background: rgba(61,155,233,.2); }
    .result-toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: .75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      z-index: 200;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
    }
    .result-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .result-toast.hit { background: var(--wound); color: #fff; }
    .result-toast.kill { background: var(--kill); color: #fff; }
    .result-toast.miss { background: #34495e; color: #ecf0f1; }
    .result-toast.wrong { background: #7f8c8d; color: #fff; }
    .win-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(6,16,24,.9);
      z-index: 150;
      align-items: center; justify-content: center;
    }
    .win-overlay.open { display: flex; }
    .win-card {
      text-align: center;
      padding: 2rem;
      background: var(--bg-panel);
      border-radius: 20px;
      border: 2px solid var(--gold);
      max-width: 400px;
    }
    .win-card h2 { color: var(--gold); margin-bottom: 1rem; font-size: 1.5rem; }
    .win-card p { margin-bottom: .5rem; color: var(--text-dim); }
    .win-card .btn { margin-top: 1rem; }
    .bank-warning {
      width: 100%;
      max-width: 900px;
      margin-bottom: .75rem;
      padding: .75rem 1rem;
      border-radius: 10px;
      background: rgba(243, 156, 18, .15);
      border: 1px solid rgba(243, 156, 18, .45);
      color: #ffd98a;
      font-size: .85rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="settings-screen" class="screen active">
    <h1>⚓ Морской бой + Квиз</h1>
    <p class="subtitle">Отвечай на вопросы и потопи все корабли на поле</p>
    <div class="panel">
      <h2>Тема вопросов</h2>
      <div class="options" id="theme-options"></div>
      <h2>Уровень сложности</h2>
      <div class="options" id="difficulty-options"></div>
      <button class="btn btn-primary" id="start-btn">Начать игру</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="bank-warning" class="bank-warning" style="display:none" role="alert"></div>
    <div class="game-header">
      <div>
        <h1>Морской бой</h1>
        <p class="game-meta" id="game-meta"></p>
      </div>
      <div class="stats">
        <div class="stat"><strong>Ходы:</strong><span id="moves">0</span></div>
        <div class="stat correct"><strong>Верно:</strong><span id="correct-count">0</span></div>
        <div class="stat wrong"><strong>Неверно:</strong><span id="wrong-count">0</span></div>
        <div class="stat"><strong>Корабли:</strong><span id="ships-left">10</span></div>
        <div class="stat"><strong>Клетки:</strong><span id="cells-left">100</span></div>
        <div class="stat" id="cycle-stat" style="display:none"><strong>Цикл вопросов:</strong><span id="question-cycle">1</span></div>
      </div>
    </div>
    <div class="board-wrap">
      <div class="board-labels" id="col-labels"></div>
      <div class="board-container">
        <div class="board-row-labels" id="row-labels"></div>
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="quiz-modal">
    <div class="modal">
      <h3 id="question-text"></h3>
      <div class="answers" id="answers"></div>
    </div>
  </div>

  <div class="result-toast" id="toast"></div>

  <div class="win-overlay" id="win-overlay">
    <div class="win-card">
      <h2>🎉 Победа!</h2>
      <p id="win-stats"></p>
      <button class="btn btn-primary" id="restart-btn">Новая игра</button>
    </div>
  </div>

  <script src="questions-bank.js"></script>

    function placeShips() {
      for (let tryAll = 0; tryAll < 200; tryAll++) {
        const grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
        const ships = [];
        let ok = true;
        for (const len of SHIPS) {
          let placed = false;
          for (let attempts = 0; attempts < 500 && !placed; attempts++) {
            const horiz = Math.random() < 0.5;
            const r = Math.floor(Math.random() * (horiz ? SIZE : SIZE - len + 1));
            const c = Math.floor(Math.random() * (horiz ? SIZE - len + 1 : SIZE));
            const cells = [];
            for (let i = 0; i < len; i++) {
              const nr = horiz ? r : r + i;
              const nc = horiz ? c + i : c;
              cells.push([nr, nc]);
            }
            if (cells.some(([rr, cc]) => grid[rr][cc])) continue;
            const touch = cells.some(([rr, cc]) => {
              for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++) {
                  const nr = rr + dr, nc = cc + dc;
                  if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc]) return true;
                }
              return false;
            });
            if (touch) continue;
            const id = ships.length;
            cells.forEach(([rr, cc]) => { grid[rr][cc] = id + 1; });
            ships.push({ id, len, cells, hits: new Set() });
            placed = true;
          }
          if (!placed) { ok = false; break; }
        }
        if (ok && ships.length === SHIPS.length) return { grid, ships };
      }
      const grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
      const ships = [{ id: 0, len: 1, cells: [[0, 0]], hits: new Set() }];
      grid[0][0] = 1;
      return { grid, ships };
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function makeOptions(correct, distractors) {
      const uniq = [String(correct)];
      for (const d of distractors) {
        const s = String(d);
        if (s !== String(correct) && !uniq.includes(s)) uniq.push(s);
      }
      let n = 1;
      while (uniq.length < 4) {
        const fake = String(+correct + n * 7 - 3);
        if (!uniq.includes(fake)) uniq.push(fake);
        n++;
      }
      const options = shuffle(uniq.slice(0, 4));
      return { options, correct: options.indexOf(String(correct)) };
    }

const QUALITY_BANNED_WORDS = [
      'четное', 'нечетное', 'нечётное', 'чётное',
      'больше', 'меньше', 'десятилетие',
      'номер', '№', 'вычисли', 'сколько будет'
    ];
    const QUALITY_CHECK_THEMES = ['sport', 'cinema', 'history', 'geography', 'english'];

    /** Сравнение двух событий: «… раньше/позже: A или B?» */
    function detectBinaryComparison(questionText) {
      const m = String(questionText).match(
        /(?:раньше|позже)[^:]*:\s*(.+?)\s+или\s+(.+?)\s*\?/i
      );
      if (!m) return null;
      return { a: m[1].trim(), b: m[2].trim() };
    }

    function isEarliestAmongFourQuestion(questionText) {
      return /раньше\s+(?:остальных|всех|других)/i.test(String(questionText));
    }

    function isQuestionQualityValid(questionText, category) {
      const lower = String(questionText).toLowerCase();
      if (QUALITY_BANNED_WORDS.some(word => lower.includes(word))) return false;
      if (/из\s+перечисленного/i.test(lower) && /\sили\s/.test(lower)) return false;
      if (/что произошло раньше|раньше остальных|какое число больше/i.test(lower)) return false;
      if (/^в каком году:\s/i.test(lower)) return false;
      if (/^\d+\s*[\+\-\×x·]\s*\d+\s*=\s*\?$/i.test(questionText)) return false;
      if (/^[\d\s\+\-\×÷\^]+\s*=\s*\?$/i.test(questionText)) return false;
      if (category === 'math' && /^\d+\^?\d*\s*=\s*\?$/i.test(questionText)) return false;
      if (!QUALITY_CHECK_THEMES.includes(category) && category !== 'math') return true;
      return true;
    }

    function uniqueDistractors(distractors, need) {
      const out = [];
      for (const d of distractors) {
        const s = String(d);
        if (!out.includes(s)) out.push(s);
        if (out.length >= need) break;
      }
      return out;
    }

    function buildQuestionFromFact(q, ans, wrong, category) {
      if (!isQuestionQualityValid(q, category)) return null;
      const answer = String(ans);
      const binary = detectBinaryComparison(q);
      let options;

      if (binary) {
        options = shuffle([binary.a, binary.b]);
      } else if (isEarliestAmongFourQuestion(q)) {
        const d = uniqueDistractors(wrong.filter(w => String(w) !== answer), 3);
        if (d.length < 3) return null;
        options = shuffle([answer, ...d.slice(0, 3)]);
      } else {
        const d = uniqueDistractors(wrong.filter(w => String(w) !== answer), 3);
        if (d.length < 3) return null;
        options = shuffle([answer, ...d.slice(0, 3)]);
      }

      const correct = options.indexOf(answer);
      if (correct < 0) return null;
      const raw = { q, options, correct, generated: true };
      return validateQuestionObject(raw, category) ? raw : null;
    }

    function validateQuestionObject(q, category) {
      if (!q || typeof q.q !== 'string' || !q.q.trim()) return false;
      if (!Array.isArray(q.options) || q.options.length < 2 || q.options.length > 4) return false;
      if (typeof q.correct !== 'number' || q.correct < 0 || q.correct >= q.options.length) return false;

      const opts = q.options.map(o => String(o));
      if (new Set(opts).size !== opts.length) return false;

      const answer = opts[q.correct];
      if (!answer) return false;

      if (!isQuestionQualityValid(q.q, category || q.category)) return false;

      const binary = detectBinaryComparison(q.q);
      if (binary) {
        if (opts.length !== 2) return false;
        const set = new Set(opts);
        if (!set.has(binary.a) || !set.has(binary.b)) return false;
        return true;
      }

      if (isEarliestAmongFourQuestion(q.q) && opts.length !== 4) return false;

      if (/из\s+перечисленного/i.test(q.q) && /\sили\s/.test(q.q)) return false;

      return true;
    }

    function filterValidatedQuestionBank(bank) {
      const valid = [];
      let rejected = 0;
      for (const q of bank) {
        if (validateQuestionObject(q, q.category)) valid.push(q);
        else rejected++;
      }
      if (rejected > 0) {
        console.warn(`[Морской бой] Отброшено ${rejected} некорректных вопросов при загрузке банка.`);
      }
      return valid;
    }

    /** Возвращает вопросы, не прошедшие проверку качества для своей темы */
    function findLowQualityQuestions(questions) {
      return questions.filter(q => !validateQuestionObject(q, q.category));
    }

    function factToQuestion(item, category) {
      const [q, ans, wrong] = item;
      return buildQuestionFromFact(q, ans, wrong, category);
    }

    function factsFromPool(pool, category, limit) {
      const out = [];
      const seen = new Set();
      for (const item of shuffle([...pool])) {
        if (out.length >= limit) break;
        const raw = factToQuestion(item, category);
        if (!raw || seen.has(raw.q)) continue;
        seen.add(raw.q);
        out.push(raw);
      }
      return out;
    }

    function getFactsPool(category, difficulty, includeAllLevels) {
      const pools = {
        cinema: CINEMA_FACTS, sport: SPORT_FACTS, history: HISTORY_FACTS, math: MATH_FACTS
      };
      const extra = { cinema: CINEMA_EXTRA };
      if (!pools[category]) return [];
      if (includeAllLevels) {
        const all = [
          ...(pools[category].easy || []),
          ...(pools[category].medium || []),
          ...(pools[category].hard || [])
        ];
        if (extra[category]) {
          all.push(...(extra[category].easy || []), ...(extra[category].medium || []), ...(extra[category].hard || []));
        }
        return all;
      }
      return [
        ...(pools[category][difficulty] || []),
        ...((extra[category] && extra[category][difficulty]) || [])
      ];
    }

    function tryAddQuestion(bank, raw, category, uid) {
      if (!raw || !validateQuestionObject(raw, category)) return false;
      if (bank.some(x => x.q === raw.q && x.category === category)) return false;
      bank.push(tagQuestion(raw, category, uid));
      return true;
    }

    function tagQuestion(q, category, uid) {
      return {
        q: q.q, options: q.options, correct: q.correct,
        category, uid, used: false, generated: !!q.generated
      };
    }

    function collectStatic(category, difficulty) {
      const list = (QUESTIONS[category] && QUESTIONS[category][difficulty]) || [];
      return list
        .map((q, i) => tagQuestion(q, category, `${category}:s:${i}:${q.q}`))
        .filter(q => validateQuestionObject(q, category));
    }

    function uniqueByText(bank) {
      const seen = new Set();
      return bank.filter(q => {
        const key = q.category + '::' + q.q;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function factsToQuestions(facts, category) {
      const out = [];
      facts.forEach(([q, ans, wrong], i) => {
        const raw = buildQuestionFromFact(q, ans, wrong, category);
        if (!raw) return;
        out.push({
          ...raw, category, uid: `${category}:f:${i}:${q}`
        });
      });
      return out;
    }

    function generateGeographyBatch(difficulty, limit) {
      const out = [];
      const seen = new Set();
      const caps = CAPITALS;
      const allCaps = caps.map(c => c[1]);

      for (const [country, cap] of caps) {
        if (out.length >= limit) break;
        const q1 = `Столица ${country}?`;
        if (!seen.has(q1) && isQuestionQualityValid(q1, 'geography')) {
          seen.add(q1);
          const w = shuffle(allCaps.filter(x => x !== cap)).slice(0, 3);
          const options = shuffle([cap, ...w]);
          out.push({ q: q1, options, correct: options.indexOf(cap), generated: true });
        }
        const q2 = `${cap} — столица какой страны?`;
        if (!seen.has(q2) && isQuestionQualityValid(q2, 'geography')) {
          seen.add(q2);
          const countries = caps.map(c => c[0]);
          const w = shuffle(countries.filter(x => x !== country)).slice(0, 3);
          const options = shuffle([country, ...w]);
          out.push({ q: q2, options, correct: options.indexOf(country), generated: true });
        }
      }

      for (const [country, continent] of CONTINENTS) {
        if (out.length >= limit) break;
        const q = `На каком материке (части света) находится ${country}?`;
        if (seen.has(q)) continue;
        seen.add(q);
        const conts = [...new Set(CONTINENTS.map(c => c[1]))];
        const w = shuffle(conts.filter(x => x !== continent)).slice(0, 3);
        const options = shuffle([continent, ...w]);
        out.push({ q, options, correct: options.indexOf(continent), generated: true });
      }

      for (const [river, region] of RIVERS) {
        if (out.length >= limit) break;
        const q = `Река ${river} связана с регионом:`;
        if (seen.has(q)) continue;
        seen.add(q);
        const regs = RIVERS.map(r => r[1]);
        const w = shuffle(regs.filter(x => x !== region)).slice(0, 3);
        const options = shuffle([region, ...w]);
        out.push({ q, options, correct: options.indexOf(region), generated: true });
      }

      if (difficulty === 'hard') {
        for (let i = 0; i < caps.length && out.length < limit; i++) {
          const [c1, cap1] = caps[i];
          const [c2] = caps[(i + 17) % caps.length];
          const q = `Какая пара «страна — столица» верна?`;
          if (seen.has(q + i)) continue;
          seen.add(q + i);
          const wrongPairs = shuffle(caps.filter(c => c[0] !== c1).map(c => `${c[0]} — ${c[1]}`)).slice(0, 2);
          const correct = `${c1} — ${cap1}`;
          const fake = `${c2} — ${caps.find(c => c[0] === c2)[1]}`;
          const options = shuffle([correct, fake, ...wrongPairs].slice(0, 4));
          out.push({ q, options, correct: options.indexOf(correct), generated: true });
        }
      }

      return out.slice(0, limit)
        .map(q => validateQuestionObject(q, 'geography') ? q : null)
        .filter(Boolean);
    }

    function generateHistoryBatch(difficulty, limit) {
      return factsFromPool(getFactsPool('history', difficulty, false), 'history', limit);
    }


    function generateEnglishBatch(difficulty, limit) {
      const words = EN_WORDS[difficulty] || EN_WORDS.easy;
      const pool = [];
      for (const [en, ru] of words) {
        pool.push([`Перевод: «${en}»`, ru, words.map(w => w[1]).filter(x => x !== ru)]);
        pool.push([`Как по-английски «${ru}»?`, en, words.map(w => w[0]).filter(x => x !== en)]);
      }
      return factsFromPool(pool, 'english', limit);
    }

    function generateMathBatch(difficulty, limit) {
      return factsFromPool(getFactsPool('math', difficulty, false), 'math', limit);
    }

    function generateForCategory(category, difficulty, limit) {
      switch (category) {
        case 'geography': return generateGeographyBatch(difficulty, limit);
        case 'history': return generateHistoryBatch(difficulty, limit);
        case 'cinema': return generateCinemaBatch(difficulty, limit);
        case 'sport': return generateSportBatch(difficulty, limit);
        case 'english': return generateEnglishBatch(difficulty, limit);
        case 'math': return generateMathBatch(difficulty, limit);
        default: return generateMathBatch(difficulty, limit);
      }
    }

    function generateCinemaBatch(difficulty, limit) {
      return factsFromPool(getFactsPool('cinema', difficulty, false), 'cinema', limit);
    }

    function generateSportBatch(difficulty, limit) {
      return factsFromPool(getFactsPool('sport', difficulty, false), 'sport', limit);
    }

    function generateThematicReserve(category, difficulty, count) {
      return factsFromPool(getFactsPool(category, difficulty, true), category, count);
    }

    function fillBankToMinimum(bank, category, difficulty) {
      let safety = 0;
      let stale = 0;
      const catForFill = category === 'mixed' ? null : category;
      while (bank.length < MIN_QUESTIONS && safety < 20000) {
        safety++;
        const before = bank.length;
        const cat = catForFill || ALL_CATEGORIES[safety % ALL_CATEGORIES.length];
        let batch;
        if (stale > 8) {
          batch = generateThematicReserve(cat, difficulty, MIN_QUESTIONS - bank.length + 20);
          stale = 0;
        } else {
          batch = generateForCategory(cat, difficulty, MIN_QUESTIONS - bank.length + 25);
        }
        for (const raw of batch) {
          if (bank.length >= MIN_QUESTIONS) break;
          tryAddQuestion(bank, raw, cat, `${cat}:g:${bank.length}:${safety}:${raw.q}`);
        }
        stale = bank.length === before ? stale + 1 : 0;
      }
      return bank;
    }

    function buildBankForCategory(category, difficulty) {
      let bank = uniqueByText([
        ...collectStatic(category, difficulty),
        ...generateForCategory(category, difficulty, MIN_QUESTIONS + 30).map((q, i) =>
          tagQuestion(q, category, `${category}:gen:${i}:${q.q}`)
        )
      ]);
      bank = fillBankToMinimum(bank, category, difficulty);
      if (bank.length < MIN_QUESTIONS) {
        const extra = generateThematicReserve(category, difficulty, MIN_QUESTIONS - bank.length + 15);
        for (const raw of extra) {
        tryAddQuestion(bank, raw, category, `${category}:res:${bank.length}:${raw.q}`);
      }
      }
      return filterValidatedQuestionBank(fillBankToMinimum(bank, category, difficulty));
    }

    function buildMixedBank(difficulty) {
      const perCat = Math.ceil(MIN_QUESTIONS / ALL_CATEGORIES.length) + 2;
      let bank = [];
      for (const cat of ALL_CATEGORIES) {
        const part = buildBankForCategory(cat, difficulty);
        shuffle(part);
        bank.push(...part.slice(0, perCat));
      }
      bank = uniqueByText(bank);
      return fillBankToMinimum(bank, 'mixed', difficulty);
    }

    function prepareGameQuestions(theme, difficulty) {
      let effectiveTheme = theme;
      let bankWarning = null;
      let questions;

      if (theme === 'mixed') {
        questions = buildMixedBank(difficulty);
      } else {
        const primary = buildBankForCategory(theme, difficulty);
        const primaryCount = primary.length;
        if (primaryCount < MIN_QUESTIONS) {
          const themeLabel = THEMES.find(t => t.id === theme).label;
          const diffLabel = DIFFICULTIES.find(d => d.id === difficulty).label;
          bankWarning =
            `⚠️ В теме «${themeLabel}» (${diffLabel}) только ${primaryCount} вопросов (нужно ${MIN_QUESTIONS}). ` +
            `Подключён смешанный банк той же сложности.`;
          questions = buildMixedBank(difficulty);
          effectiveTheme = 'mixed';
        } else {
          questions = primary;
        }
      }

      questions = filterValidatedQuestionBank(
        fillBankToMinimum(uniqueByText(questions), effectiveTheme, difficulty)
      );
      return { questions, cycle: 1, bankWarning, effectiveTheme };
    }

    function topUpQuestionBank(count) {
      const cat = state.effectiveTheme === 'mixed'
        ? ALL_CATEGORIES[Math.floor(Math.random() * ALL_CATEGORIES.length)]
        : state.theme;
      const batch = generateForCategory(cat, state.difficulty, count);
      for (const raw of batch) {
        if (!validateQuestionObject(raw, cat)) continue;
        const tq = tagQuestion(raw, cat, `${cat}:live:${state.questions.length}:${raw.q}`);
        if (!state.questions.some(x => x.q === tq.q && x.category === tq.category)) {
          state.questions.push(tq);
        }
      }
    }

    /** Соседние клетки (8 направлений) вокруг всех палуб корабля */
    function getAdjacentCellsAroundShip(cells) {
      const shipKeys = new Set(cells.map(([r, c]) => `${r},${c}`));
      const adjacent = new Set();
      for (const [r, c] of cells) {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr;
            const nc = c + dc;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
            const key = `${nr},${nc}`;
            if (!shipKeys.has(key)) adjacent.add(key);
          }
        }
      }
      return [...adjacent].map(key => key.split(',').map(Number));
    }

    /** После потопления — пометить вокруг гарантированно пустые клетки */
    function markEmptyAroundSunkShip(ship) {
      for (const [r, c] of getAdjacentCellsAroundShip(ship.cells)) {
        const cur = state.shots[r][c];
        if (cur === 'kill' || cur === 'wound') continue;
        state.shots[r][c] = 'empty';
      }
    }

    /** Клетки кораблей не должны помечаться «мимо» без попадания */
    function countBlockedShipCells() {
      let n = 0;
      for (const ship of state.ships) {
        for (const [r, c] of ship.cells) {
          if (state.shots[r][c] === 'miss') n++;
        }
      }
      return n;
    }

    function applyShotAt(r, c) {
      const shipId = state.grid[r][c];
      if (shipId) {
        const ship = state.ships[shipId - 1];
        ship.hits.add(`${r},${c}`);
        const sunk = ship.cells.every(([rr, cc]) => ship.hits.has(`${rr},${cc}`));
        if (sunk) {
          ship.cells.forEach(([rr, cc]) => { state.shots[rr][cc] = 'kill'; });
          markEmptyAroundSunkShip(ship);
          showToast('Убит! Соседние клетки отмечены как пустые', 'kill');
          return 'kill';
        }
        state.shots[r][c] = 'wound';
        showToast('Ранен!', 'hit');
        return 'wound';
      }
      state.shots[r][c] = 'miss';
      showToast('Мимо!', 'miss');
      return 'miss';
    }

    function initQuestionCycle(theme, difficulty) {
      return prepareGameQuestions(theme, difficulty);
    }
    function resetQuestionCycle() {
      state.questions.forEach(q => { q.used = false; });
      shuffle(state.questions);
      state.questionCycle++;
      document.getElementById('question-cycle').textContent = state.questionCycle;
      document.getElementById('cycle-stat').style.display = state.questionCycle > 1 ? '' : 'none';
    }

    function pickNextQuestion() {
      let available = state.questions.filter(q => !q.used);
      if (!available.length) {
        resetQuestionCycle();
        available = state.questions.filter(q => !q.used);
      }
      if (!available.length) {
        topUpQuestionBank(25);
        available = state.questions.filter(q => !q.used);
      }
      const q = available[Math.floor(Math.random() * available.length)];
      q.used = true;
      return q;
    }

    function countOpenCells() {
      let n = 0;
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (!state.shots[r][c]) n++;
      return n;
    }

    function startGame() {
      const theme = document.querySelector('input[name="theme"]:checked').value;
      const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
      const { grid, ships } = placeShips();
      const themeLabel = THEMES.find(t => t.id === theme).label;
      const diffLabel = DIFFICULTIES.find(d => d.id === difficulty).label;

      const { questions, cycle, bankWarning, effectiveTheme } = initQuestionCycle(theme, difficulty);

      state = {
        theme, difficulty, effectiveTheme, grid, ships,
        questions,
        questionCycle: cycle,
        bankWarning,
        pendingCell: null,
        moves: 0,
        correct: 0,
        wrong: 0,
        shots: Array(SIZE).fill(null).map(() => Array(SIZE).fill(null))
      };

      const warnEl = document.getElementById('bank-warning');
      if (bankWarning) {
        warnEl.textContent = bankWarning;
        warnEl.style.display = 'block';
      } else {
        warnEl.style.display = 'none';
      }

      document.getElementById('question-cycle').textContent = cycle;
      document.getElementById('cycle-stat').style.display = 'none';
      const bankNote = questions.length >= MIN_QUESTIONS
        ? `в банке: ${questions.length}`
        : `в банке: ${questions.length} (добор до ${MIN_QUESTIONS})`;
      document.getElementById('game-meta').textContent =
        `${themeLabel} · ${diffLabel} · ${bankNote}`;
      updateStats();
      renderBoard();
      showScreen('game');
    }

    function renderBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      const cols = document.getElementById('col-labels');
      cols.innerHTML = '<span class="corner"></span>';
      for (let c = 0; c < SIZE; c++) cols.innerHTML += `<span>${c + 1}</span>`;
      const rows = document.getElementById('row-labels');
      rows.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        rows.innerHTML += `<span>${String.fromCharCode(65 + r)}</span>`;
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          applyCellVisual(cell, r, c);
          if (!state.shots[r][c]) cell.onclick = () => onCellClick(r, c);
          board.appendChild(cell);
        }
      }
    }

    function applyCellVisual(el, r, c) {
      const shot = state.shots[r][c];
      el.className = 'cell';
      if (!shot) return;
      el.classList.add('shot');
      if (shot === 'miss') { el.classList.add('miss'); el.textContent = 'мимо'; }
      else if (shot === 'wound') { el.classList.add('wound'); el.textContent = 'ранен'; }
      else if (shot === 'kill') { el.classList.add('kill'); el.textContent = 'убит'; }
      else if (shot === 'empty') {
        el.classList.add('empty');
        el.textContent = '·';
        el.title = 'Гарантированно пусто — стрелять нельзя';
      }
    }

    function onCellClick(r, c) {
      if (state.shots[r][c]) return;
      const q = pickNextQuestion();
      state.pendingCell = { r, c };
      state.currentQuestion = q;
      showQuiz(q);
    }

    function showQuiz(q) {
      document.getElementById('question-text').textContent = q.q;
      const ans = document.getElementById('answers');
      ans.innerHTML = '';
      const opts = shuffle([...q.options.map((text, i) => ({ text, i }))]);
      opts.forEach(({ text, i }) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'answer-btn';
        btn.textContent = text;
        btn.onclick = () => answerQuestion(i === q.correct);
        ans.appendChild(btn);
      });
      document.getElementById('quiz-modal').classList.add('open');
    }

    function answerQuestion(isCorrect) {
      document.getElementById('quiz-modal').classList.remove('open');
      const { r, c } = state.pendingCell;
      state.moves++;
      if (isCorrect) state.correct++;
      else state.wrong++;

      let result;
      if (isCorrect) {
        result = applyShotAt(r, c);
      } else {
        result = 'wrong';
        showToast('Промах! Неверный ответ — клетку можно выбрать снова', 'wrong');
        if (countBlockedShipCells() > 0) {
          console.error('[Морской бой] Обнаружена заблокированная клетка корабля — сброс пометки «мимо».');
          for (const ship of state.ships) {
            for (const [rr, cc] of ship.cells) {
              if (state.shots[rr][cc] === 'miss') state.shots[rr][cc] = null;
            }
          }
        }
      }

      state.pendingCell = null;
      updateStats();
      renderBoard();
      checkWin();
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'result-toast show ' + type;
      clearTimeout(t._tm);
      t._tm = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function updateStats() {
      document.getElementById('moves').textContent = state.moves;
      document.getElementById('correct-count').textContent = state.correct;
      document.getElementById('wrong-count').textContent = state.wrong;
      const alive = state.ships.filter(s =>
        s.cells.some(([rr, cc]) => !s.hits.has(`${rr},${cc}`))
      ).length;
      document.getElementById('ships-left').textContent = alive;
      document.getElementById('cells-left').textContent = countOpenCells();
    }

    function checkWin() {
      const allSunk = state.ships.every(s =>
        s.cells.every(([rr, cc]) => s.hits.has(`${rr},${cc}`))
      );
      const allCellsOpen = countOpenCells() === 0;
      if (!allSunk && !allCellsOpen) return;

      const reason = allSunk
        ? 'Все корабли потоплены!'
        : 'Все клетки поля открыты!';
      const cycles = state.questionCycle > 1
        ? `<br>Циклов вопросов: ${state.questionCycle}`
        : '';

      document.getElementById('win-stats').innerHTML =
        `<strong>${reason}</strong><br>Ходов: ${state.moves}<br>` +
        `Верных ответов: ${state.correct}<br>Неверных: ${state.wrong}${cycles}`;
      document.getElementById('win-overlay').classList.add('open');
    }

    initSettings();
  </script>
</body>
</html>
